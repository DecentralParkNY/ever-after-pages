<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evergreen — your wedding, one beautiful link</title>
<style>
  :root{
    --serif: 'Cormorant Garamond', 'Hoefler Text', 'Iowan Old Style', Georgia, 'Times New Roman', serif;
    --sans: 'Jost', 'Avenir Next', 'Century Gothic', 'Futura', system-ui, sans-serif;
    --ink:#2b2a26;
    --sage:#7c8a6f;
    --sage-deep:#5c6a4f;
    --blush:#e8d6cf;
    --cream:#f6f1e9;
    --paper:#fbf8f3;
    --gold:#b79a6a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #fff 0%, var(--paper) 45%, var(--cream) 100%);
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
    overflow-x:hidden;
  }

  /* faint botanical corners */
  .leaf{position:fixed;font-size:150px;color:var(--sage);opacity:.09;pointer-events:none;user-select:none;line-height:1}
  .leaf.tl{top:-30px;left:-20px;transform:rotate(15deg)}
  .leaf.br{bottom:-40px;right:-20px;transform:rotate(200deg)}

  .card{
    position:relative;
    width:min(560px,100%);
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(6px);
    border:1px solid rgba(124,138,111,.28);
    border-radius:26px;
    padding:46px 40px 40px;
    box-shadow:0 30px 80px -30px rgba(70,74,55,.35);
    text-align:center;
  }

  .badge{
    font-size:12px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--sage-deep);font-weight:500;
  }
  .badge::before,.badge::after{content:"❧";margin:0 12px;color:var(--gold);opacity:.7}

  .names{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(46px,11vw,74px);
    line-height:.95;
    margin:22px 0 6px;
    color:var(--ink);
  }
  .names .amp{font-style:italic;color:var(--gold);font-size:.7em;display:block;margin:6px 0}

  .meta{
    font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#8a8578;
    margin-bottom:26px;
  }

  .pitch{
    font-family:var(--serif);
    font-style:italic;
    font-size:clamp(20px,4.6vw,27px);
    line-height:1.32;
    color:var(--sage-deep);
    max-width:26ch;
    margin:0 auto 30px;
  }

  /* countdown */
  .count{display:flex;justify-content:center;gap:20px;margin-bottom:30px}
  .count .u{min-width:58px}
  .count .n{
    font-family:var(--serif);
    font-size:38px;font-weight:500;color:var(--ink);
    line-height:1;
  }
  .count .l{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#9a9488;margin-top:6px}
  .count .u+.u{border-left:1px solid rgba(124,138,111,.25);padding-left:20px}

  /* the one interaction */
  .rsvp{
    appearance:none;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:400;
    font-size:15px;letter-spacing:.18em;text-transform:uppercase;
    color:#fff;background:var(--sage);
    padding:17px 40px;border-radius:100px;
    box-shadow:0 12px 26px -10px rgba(92,106,79,.7);
    transition:transform .25s ease, background .4s ease, letter-spacing .25s ease;
  }
  .rsvp:hover{transform:translateY(-2px);background:var(--sage-deep);letter-spacing:.24em}
  .rsvp.done{background:var(--gold);box-shadow:0 12px 26px -10px rgba(183,154,106,.75);pointer-events:none}
  .rsvp .heart{opacity:0;width:0;display:inline-block;transition:opacity .3s .1s}
  .rsvp.done .heart{opacity:1;width:auto;margin-right:8px}

  .hint{margin-top:16px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#a7a294;min-height:16px;transition:color .3s}
  .hint.done{color:var(--sage-deep)}

  .foot{margin-top:34px;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#b8b3a5}
  .foot b{color:var(--sage-deep);font-weight:500}
</style>
</head>
<body>
  <div class="leaf tl">❦</div>
  <div class="leaf br">❦</div>

  <main class="card">
    <div class="badge">Together with their families</div>

    <h1 class="names">Maya<span class="amp">and</span>Daniel</h1>
    <div class="meta">September 14, 2026 · Hudson Valley, NY</div>

    <p class="pitch">One beautiful link that holds your whole wedding — and RSVPs for you.</p>

    <div class="count" id="count" aria-label="countdown">
      <div class="u"><div class="n" id="d">—</div><div class="l">Days</div></div>
      <div class="u"><div class="n" id="h">—</div><div class="l">Hours</div></div>
      <div class="u"><div class="n" id="m">—</div><div class="l">Min</div></div>
    </div>

    <button class="rsvp" id="rsvp">
      <span class="heart">♡</span><span id="rsvpText">Reserve my seat</span>
    </button>
    <div class="hint" id="hint">Tap to see the one-touch RSVP feel</div>

    <div class="foot">Made with <b>Evergreen</b></div>
  </main>

<script>
  // Live countdown to the big day
  var day = new Date(2026, 8, 14, 16, 0, 0); // Sep 14, 2026, 4:00pm
  function tick(){
    var now = new Date();
    var s = Math.max(0, (day - now)/1000);
    document.getElementById('d').textContent = Math.floor(s/86400);
    document.getElementById('h').textContent = Math.floor(s%86400/3600);
    document.getElementById('m').textContent = Math.floor(s%3600/60);
  }
  tick(); setInterval(tick, 1000*30);

  // The one interaction: a single-tap RSVP that confirms in place
  var btn = document.getElementById('rsvp');
  var txt = document.getElementById('rsvpText');
  var hint = document.getElementById('hint');
  btn.addEventListener('click', function(){
    btn.classList.add('done');
    hint.classList.add('done');
    txt.textContent = "You're on the list";
    hint.textContent = "Table, meal & travel details sent to you";
  });
</script>
</body>
</html>
